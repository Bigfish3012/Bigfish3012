<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
      .pixel { font-family: 'Press Start 2P', monospace; }
    </style>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#0A0A12"/>
      <rect width="1" height="24" fill="#ffffff08"/>
      <rect width="24" height="1" fill="#ffffff08"/>
    </pattern>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2DE1C2" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF3D7F" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="url(#grid)"/>
  <rect width="1200" height="300" fill="url(#glow)"/>

  <!-- scattered pixel stars -->
  <g fill="#FFC93C">
    <rect x="60" y="40" width="4" height="4"/>
    <rect x="140" y="90" width="4" height="4"/>
    <rect x="1080" y="50" width="4" height="4"/>
    <rect x="1000" y="220" width="4" height="4"/>
    <rect x="90" y="230" width="4" height="4"/>
    <rect x="1140" y="150" width="4" height="4"/>
    <rect x="40" y="160" width="4" height="4"/>
  </g>

  <!-- pixel frame corners -->
  <g fill="#2DE1C2">
    <rect x="20" y="20" width="24" height="8"/>
    <rect x="20" y="20" width="8" height="24"/>
    <rect x="1156" y="20" width="24" height="8"/>
    <rect x="1172" y="20" width="8" height="24"/>
    <rect x="20" y="272" width="24" height="8"/>
    <rect x="20" y="256" width="8" height="24"/>
    <rect x="1156" y="272" width="24" height="8"/>
    <rect x="1172" y="256" width="8" height="24"/>
  </g>

  <!-- health bar HUD top right -->
  <g>
    <text x="1180" y="52" text-anchor="end" class="pixel" font-size="10" fill="#8C93B4">HP</text>
    <rect x="1000" y="42" width="150" height="14" fill="none" stroke="#2A3050" stroke-width="2"/>
    <rect x="1004" y="46" width="142" height="6" fill="#FF3D7F"/>
  </g>

  <!-- coin icon -->
  <g>
    <circle cx="990" cy="49" r="9" fill="#FFC93C"/>
    <circle cx="990" cy="49" r="9" fill="none" stroke="#0A0A12" stroke-width="2"/>
  </g>

  <!-- title -->
  <text x="70" y="145" class="pixel" font-size="42" fill="#EDEFF7">CHENGKUN LI</text>
  <text x="72" y="147" class="pixel" font-size="42" fill="#FF3D7F" opacity="0.35">CHENGKUN LI</text>

  <text x="70" y="185" class="pixel" font-size="14" fill="#2DE1C2">BIGFISH — GAME DESIGNER &amp; DEVELOPER</text>

  <!-- blinking press start -->
  <text x="70" y="230" class="pixel" font-size="12" fill="#FFC93C">
    &gt; PRESS START
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </text>

  <!-- small pixel sprite (8-bit blob) bottom right -->
  <g transform="translate(1080,190)">
    <rect x="8" y="0" width="8" height="8" fill="#2DE1C2"/>
    <rect x="16" y="0" width="8" height="8" fill="#2DE1C2"/>
    <rect x="0" y="8" width="8" height="8" fill="#2DE1C2"/>
    <rect x="8" y="8" width="8" height="8" fill="#0A0A12"/>
    <rect x="16" y="8" width="8" height="8" fill="#0A0A12"/>
    <rect x="24" y="8" width="8" height="8" fill="#2DE1C2"/>
    <rect x="0" y="16" width="32" height="8" fill="#2DE1C2"/>
    <rect x="0" y="24" width="8" height="8" fill="#2DE1C2"/>
    <rect x="16" y="24" width="8" height="8" fill="#2DE1C2"/>
  </g>
</svg>
